<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB AutoPoster</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.hero{text-align:center;max-width:400px}
.icon{font-size:64px;margin-bottom:16px}
h1{font-size:28px;font-weight:800;color:#1877f2;margin-bottom:8px}
p{font-size:15px;color:#65676b;line-height:1.6;margin-bottom:24px}
.btn{display:inline-block;background:#1877f2;color:#fff;text-decoration:none;padding:12px 32px;border-radius:10px;font-size:15px;font-weight:700;transition:background .15s}
.btn:hover{background:#166fe5}
.features{margin-top:32px;text-align:left;background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.features li{list-style:none;padding:6px 0;font-size:13px;color:#444;border-bottom:1px solid #f0f2f5}
.features li:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="hero">
  <div class="icon">📅</div>
  <h1>FB AutoPoster</h1>
  <p>Tự động đăng bài lên Facebook Page — lên lịch sẵn hoặc để AI tạo nội dung cho bạn.</p>
  <a href="/dashboard" class="btn">Vào Dashboard</a>
  <ul class="features">
    <li>✨ AI tạo nội dung từ chủ đề</li>
    <li>📅 Lên lịch đăng bài tự động</li>
    <li>⚡ Đăng ngay lập tức</li>
    <li>📋 Theo dõi lịch sử bài đăng</li>
    <li>🔗 Hỗ trợ đính kèm link</li>
  </ul>
</div>
</body>
</html>
